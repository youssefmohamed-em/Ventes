<article
  class="group rounded-[24px] border-2 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl
         hover:shadow-[0_20px_60px_rgba(0,0,0,0.15)] hover:scale-[1.01] hover:-translate-y-1
         transition-all duration-500 p-5 flex flex-col gap-4 relative w-full overflow-hidden cursor-pointer"
  [ngClass]="borderClass()"
  (click)="goToDetails()"
>
  <div class="absolute inset-0 bg-gradient-to-br opacity-0 group-hover:opacity-100 transition-all duration-700 rounded-[24px] -z-10"
       [ngClass]="hoverGradient()"></div>

  <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-1000 overflow-hidden rounded-[24px] -z-10">
    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent
                -translate-x-full group-hover:translate-x-full transition-transform duration-[1400ms] ease-out"></div>
  </div>

  <div class="absolute -top-6 -right-6 w-32 h-32 rounded-full opacity-[0.06] group-hover:opacity-[0.1] transition-opacity duration-700 -z-10"
       [ngClass]="decCircle1()"></div>
  <div class="absolute -bottom-6 -left-6 w-24 h-24 rounded-full opacity-[0.06] group-hover:opacity-[0.1] transition-opacity duration-700 -z-10"
       [ngClass]="decCircle1()"></div>

  <div class="flex items-start justify-between gap-3 z-10">
    <div class="flex items-center gap-3">
      <div class="h-11 w-11 rounded-[16px] grid place-items-center shrink-0 shadow-lg
                  transition-all duration-500 group-hover:scale-110 group-hover:rotate-6 relative"
           [ngClass]="'bg-gradient-to-br ' + iconBgClass()">
        <div class="absolute inset-0 rounded-[16px] opacity-0 group-hover:opacity-50 blur-xl transition-opacity duration-700"
             [ngClass]="glowClass()"></div>
        <i class="pi pi-chart-line text-white text-base relative z-10"></i>
      </div>
      <div>
        <p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">{{ title }}</p>
        <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">{{ subtitle }}</p>
      </div>
    </div>

    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-xl border-2 text-xs font-extrabold shrink-0"
          [ngClass]="trendClass()">
      <i class="pi text-xs" [ngClass]="trendPositive() ? 'pi-arrow-up' : 'pi-arrow-down'"></i>
      {{ trendText() }}
    </span>
  </div>

  <div class="w-full h-48 sm:h-56 z-10 relative">
    <p-chart
      [type]="type"
      [data]="data()"
      [options]="options()"
      class="w-full h-full">
    </p-chart>
  </div>

  <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-all duration-500
              group-hover:translate-x-1 group-hover:-translate-y-1 z-10">
    <i class="pi pi-arrow-up-right text-slate-300 text-sm"></i>
  </div>
</article>

<style>
  article {
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
