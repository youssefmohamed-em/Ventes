<div class="rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 overflow-hidden shadow-sm">
  
  <p-table
    [value]="data"
    [paginator]="true"
    [rows]="10"
    [totalRecords]="totalRecords"
    [lazy]="true"
    (onLazyLoad)="onPage($event)"
    [(selection)]="selectedRows"
    [selectionMode]="selectionMode"
    (selectionChange)="onSelectionChange()"
    styleClass="p-datatable-separated"
  >

    <!-- HEADER -->
    <ng-template pTemplate="header">
      <tr class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white uppercase text-xs tracking-widest">
        <th *ngIf="selectionMode !== null" class="pl-5" style="width: 3rem">
          <p-tableHeaderCheckbox *ngIf="selectionMode === 'multiple'"></p-tableHeaderCheckbox>
        </th>
        <th *ngFor="let col of columns" pSortableColumn="{{ col.field }}" class="py-4 px-4 font-bold">
          <div class="flex items-center gap-2">
            {{ col.header | translate }}
            <p-sortIcon field="{{ col.field }}"></p-sortIcon>
          </div>
        </th>
        <th style="width: 3rem"></th>
      </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-row>
      <tr class="group border-t border-gray-50 dark:border-gray-800 
                hover:bg-gray-50/80 dark:hover:bg-gray-800/40 transition-colors duration-200">

        <td *ngIf="selectionMode !== null" class="pl-5">
          <p-tableCheckbox [value]="row"></p-tableCheckbox>
        </td>

        <td *ngFor="let col of columns; let first = first"
            class="py-3.5 px-4 text-sm text-gray-600 dark:text-gray-300"
            [class.font-semibold]="first"
            [class.text-gray-900]="first"
            [ngClass]="{
              'text-yellow-500 font-bold': getValue(row, col.field) === 'Gold',
              'text-emerald-500 font-bold': getValue(row, col.field) === 'Green',
              'text-gray-400 font-semibold': getValue(row, col.field) === 'Silver',
              'text-orange-400 font-semibold': getValue(row, col.field) === 'Bronze'
            }">

          <!-- Name cell -->
          <div class="flex items-center gap-3" *ngIf="col.field === 'name'; else other">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-200 to-violet-300
                        dark:from-indigo-700 dark:to-violet-600 overflow-hidden flex-shrink-0
                        ring-2 ring-white dark:ring-gray-800 shadow-sm flex items-center justify-center">
              <span class="text-xs font-bold text-indigo-600 dark:text-indigo-300 uppercase">
                {{ getValue(row, col.field)?.[0] }}
              </span>
            </div>
            <span>{{ getValue(row, col.field) }}</span>
          </div>
          <ng-template #other>{{ getValue(row, col.field) }}</ng-template>
        </td>

        <!-- Actions -->
        <td class="pr-4 text-center">
          <button class="w-8 h-8 flex items-center justify-center rounded-full
                        opacity-0 group-hover:opacity-100 transition-all duration-200
                        hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="pi pi-ellipsis-v text-gray-400 text-sm cursor-pointer"></i>
          </button>
        </td>

      </tr>
    </ng-template>

    <!-- PAGINATOR -->
    <ng-template pTemplate="paginatorleft">
      <div class="text-xs text-gray-400 dark:text-gray-500 pl-2">
        {{ 'TABLE.SHOWING' | translate }} {{ data.length }} {{ 'TABLE.OF' | translate }} {{ totalRecords }}
      </div>
    </ng-template>

  </p-table>
</div>
