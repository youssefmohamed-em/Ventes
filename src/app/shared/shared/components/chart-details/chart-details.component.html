<div class="min-h-screen bg-slate-50 dark:bg-gray-950 p-6">

  <!-- HEADER -->
  <div class="flex items-center gap-4 mb-8">
    <button (click)="goBack()" class="h-10 w-10 rounded-xl bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-700 grid place-items-center shadow-sm hover:scale-105 transition-transform duration-200">
      <i class="pi pi-arrow-left text-slate-600 dark:text-slate-300"></i>
    </button>
    <div>
      <h1 class="text-xl font-bold text-slate-800 dark:text-white">{{ title() }}</h1>
      <p class="text-sm text-slate-400">{{ subtitle() }}</p>
    </div>
    <span class="ml-auto px-3 py-1 rounded-xl text-xs font-bold uppercase tracking-widest" [ngClass]="badgeClass()">
      {{ type() }}
    </span>
  </div>

  <!-- RANGE FILTER -->
  <div class="flex gap-2 mb-6">
    <button (click)="changeRange('day')" [ngClass]="range() === 'day' ? 'bg-blue-500 text-white' : 'bg-white dark:bg-gray-900 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-gray-700' " class="px-4 py-1 rounded-xl shadow-sm">{{'DAY'|translate}}</button>
    <button (click)="changeRange('month')" [ngClass]="range() === 'month' ? 'bg-blue-500 text-white' : 'bg-white dark:bg-gray-900 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-gray-700' " class="px-4 py-1 rounded-xl shadow-sm">{{'MONTH'|translate}}</button>
    <button (click)="changeRange('year')" [ngClass]="range() === 'year' ? 'bg-blue-500 text-white' : 'bg-white dark:bg-gray-900 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-gray-700' " class="px-4 py-1 rounded-xl shadow-sm">{{'YEAR'|translate}}</button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-3 gap-4 mb-6">
    <div class="rounded-2xl bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-700 p-5 shadow-sm">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{{ 'DETAILS.TOTAL' | translate }}</p>
      <p class="text-3xl font-extrabold" [ngClass]="badgeClass()">{{ total() }}</p>
    </div>
    <div class="rounded-2xl bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-700 p-5 shadow-sm">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{{ 'DETAILS.HIGHEST' | translate }}</p>
      <p class="text-3xl font-extrabold text-emerald-500">{{ highest() }}</p>
    </div>
    <div class="rounded-2xl bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-700 p-5 shadow-sm">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{{ 'DETAILS.LOWEST' | translate }}</p>
      <p class="text-3xl font-extrabold text-rose-500">{{ lowest() }}</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="rounded-2xl bg-white dark:bg-gray-900 border border-slate-200 dark:border-gray-700 p-5 shadow-sm">
    <div class="flex items-center gap-3 mb-4">
      <div class="h-9 w-9 rounded-[12px] grid place-items-center shadow-md" [ngClass]="'bg-gradient-to-br ' + iconBgClass()">
        <i class="pi pi-chart-line text-white text-sm"></i>
      </div>
      <div>
        <p class="text-sm font-bold text-slate-700 dark:text-slate-200">{{ title() }}</p>
        <p class="text-xs text-slate-400">{{ subtitle() }}</p>
      </div>
    </div>
    <div class="h-72">
      <p-chart [type]="type()" [data]="data()" [options]="options()" class="w-full h-full"></p-chart>
    </div>
  </div>

</div>
