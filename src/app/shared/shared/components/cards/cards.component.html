<article
  class="group rounded-[24px] border-2 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl
         hover:shadow-[0_20px_60px_rgba(0,0,0,0.15)] hover:scale-[1.03] hover:-translate-y-2
         transition-all duration-500 p-5 flex items-start gap-4 relative overflow-hidden cursor-pointer"
  [ngClass]="color === 'green' ? 'border-emerald-200 dark:border-emerald-800' : 'border-red-200 dark:border-red-800'"
>

  <!-- ANIMATED BACKGROUND GRADIENT -->
  <div class="absolute inset-0 bg-gradient-to-br opacity-0 group-hover:opacity-100 transition-all duration-700 rounded-[24px]"
       [ngClass]="color === 'green' 
         ? 'from-emerald-50 via-teal-50 to-cyan-50 dark:from-emerald-950/40 dark:via-teal-950/40 dark:to-cyan-950/40' 
         : 'from-red-50 via-rose-50 to-pink-50 dark:from-red-950/40 dark:via-rose-950/40 dark:to-pink-950/40'">
  </div>

  <!-- SHIMMER -->
  <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-1000 overflow-hidden rounded-[24px]">
    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/25 to-transparent 
                -translate-x-full group-hover:translate-x-full transition-transform duration-[1200ms] ease-out">
    </div>
  </div>

  <!-- DECORATIVE CIRCLES -->
  <div class="absolute -top-4 -right-4 w-28 h-28 rounded-full opacity-[0.07] group-hover:opacity-[0.12] transition-opacity duration-700"
       [ngClass]="color === 'green' ? 'bg-emerald-400' : 'bg-red-400'"></div>
  <div class="absolute -bottom-4 -left-4 w-20 h-20 rounded-full opacity-[0.07] group-hover:opacity-[0.12] transition-opacity duration-700"
       [ngClass]="color === 'green' ? 'bg-teal-400' : 'bg-rose-400'"></div>

  <!-- ICON -->
  <div class="h-14 w-14 rounded-[18px] grid place-items-center shrink-0 transition-all duration-500
              group-hover:scale-110 group-hover:rotate-6 relative z-10 shadow-lg"
       [ngClass]="color === 'green' 
         ? 'bg-gradient-to-br from-emerald-400 to-teal-500' 
         : 'bg-gradient-to-br from-red-400 to-rose-500'"
  >
    <!-- ICON GLOW -->
    <div class="absolute inset-0 rounded-[18px] opacity-0 group-hover:opacity-60 blur-xl transition-opacity duration-700"
         [ngClass]="color === 'green' ? 'bg-emerald-400' : 'bg-red-400'"></div>

    <i [class]="icon + ' text-xl text-white relative z-10 transition-all duration-500 group-hover:scale-110'"></i>
  </div>

  <!-- CONTENT -->
  <div class="min-w-0 flex-1 relative z-10">
    <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-1.5">
      {{ title }}
    </p>

    <h2 class="text-3xl font-black text-slate-900 dark:text-white leading-none mb-2 tracking-tight
               transition-colors duration-300"
        [ngClass]="color === 'green' ? 'group-hover:text-emerald-600' : 'group-hover:text-red-500'">
      {{ value }}
    </h2>

    <div class="flex items-center gap-2 flex-wrap">
      <!-- Trend Badge -->
      <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-xl border-2 text-xs font-extrabold
                   transition-all duration-300 hover:scale-105"
            [ngClass]="color === 'green' 
              ? 'text-emerald-600 border-emerald-200 bg-emerald-50 dark:bg-emerald-900/30 dark:border-emerald-700 dark:text-emerald-400' 
              : 'text-red-500 border-red-200 bg-red-50 dark:bg-red-900/30 dark:border-red-700 dark:text-red-400'"
      >
        <i class="pi text-xs"
           [ngClass]="color === 'green' ? 'pi-arrow-up' : 'pi-arrow-down'"></i>
        {{ percent }}
      </span>

      <a class="text-xs font-semibold transition-colors duration-300 cursor-pointer"
         [ngClass]="color === 'green' 
           ? 'text-slate-400 hover:text-emerald-500' 
           : 'text-slate-400 hover:text-red-500'">
       {{ 'CARD.VIEW_REPORT' | translate }} →
      </a>
    </div>
  </div>

  <!-- CORNER ARROW -->
  <div class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-all duration-500
              group-hover:translate-x-1 group-hover:-translate-y-1">
    <i class="pi pi-arrow-up-right text-slate-300 text-sm"></i>
  </div>

</article>

<style>
  article {
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(24px) scale(0.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>
