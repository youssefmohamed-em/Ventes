<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-600 to-blue-500 p-4">
  <div class="w-full max-w-md bg-white/20 backdrop-blur-md rounded-2xl shadow-lg p-8">
    
    <!-- Logo -->
    <h1 class="text-4xl font-extrabold text-white text-center mb-6">VENTES</h1>

    <!-- Card -->
    <div class="bg-white rounded-xl p-6 shadow-md">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Login</h2>

      <!-- Email Input -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-1" for="email">Email</label>
        <input 
          id="email"
          type="email" 
          [(ngModel)]="email" 
           (keyup.enter)="login()"
          placeholder="Enter your email"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Password Input -->
      <div class="mb-6">
        <label class="block text-gray-700 mb-1" for="password">Password</label>
        <input 
          id="password"
          type="password" 
          [(ngModel)]="password"
           (keyup.enter)="login()" 
          placeholder="Enter your password"
          class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Login Button -->
      <button 
        class="w-full bg-purple-600 text-white p-3 rounded-lg hover:bg-purple-700 transition duration-300 font-semibold"
        (click)="login()"
      >
        Sign In
      </button>

      <!-- Extra Links -->
    </div>
  </div>
</div>
