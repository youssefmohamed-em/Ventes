<div class="min-h-screen flex items-center justify-center 
bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-4">

  <div class="w-full max-w-md bg-white/30 backdrop-blur-xl 
  rounded-3xl shadow-2xl p-8 border border-white/20">

    <!-- Logo -->
    <h1 class="text-4xl font-extrabold text-white drop-shadow text-center mb-8 tracking-wide">
      VENTES
    </h1>

    <!-- Card -->
    <div class="bg-white/90 rounded-2xl p-7 shadow-md">

      <h2 class="text-2xl font-semibold text-gray-800 mb-8 text-center">
        Welcome Back
      </h2>

      <!-- Email Input -->
      <div class="mb-5">
        <label class="block text-gray-700 mb-1 font-medium" for="email">Email</label>
        <input 
          id="email"
          type="email"
          [(ngModel)]="email"
          (keyup.enter)="login()"
          placeholder="Enter your email"
          class="w-full p-3 rounded-xl border border-gray-300 
          focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400
          transition"
        />
      </div>

      <!-- Password Input -->
      <div class="mb-7">
        <label class="block text-gray-700 mb-1 font-medium" for="password">Password</label>
        <input 
          id="password"
          type="password"
          [(ngModel)]="password"
          (keyup.enter)="login()"
          placeholder="Enter your password"
          class="w-full p-3 rounded-xl border border-gray-300 
          focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400
          transition"
        />
      </div>

      <!-- Login Button -->
      <button 
        class="w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 
        text-white p-3 rounded-xl hover:brightness-110 
        transition font-semibold flex items-center justify-center gap-2 
        disabled:opacity-60 disabled:cursor-not-allowed shadow-lg"
        (click)="login()"
        [disabled]="isLoading()"
      >

        @if (isLoading()) {
          <span class="flex items-center gap-1">
            <span class="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:-0.3s]"></span>
            <span class="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:-0.15s]"></span>
            <span class="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></span>
          </span>
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
        }

      </button>

    </div>
  </div>

</div>

<p-toast></p-toast>
