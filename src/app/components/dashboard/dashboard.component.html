<div class="p-3 sm:p-6 lg:p-8 flex flex-col gap-4 sm:gap-6">
  <!-- الكروت -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
    <app-cards title="{{ 'DASHBOARD.TOTAL_PROFIT' | translate }}" value="$2,435k" icon="pi pi-chart-line"
      percent="-3.5%" color="red"></app-cards>
    <app-cards title="{{ '.TOTAL_CLAIMS' | translate }}" value="3.5M" icon="pi pi-book" percent="+15%"
      color="green"></app-cards>
  </div>
  <!-- Filter Bar -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div class="flex items-center gap-2 bg-white dark:bg-gray-900 rounded-2xl shadow-sm px-4 py-2 border border-gray-100 dark:border-gray-700">
      <p-select
        [options]="merchants"
        [(ngModel)]="selectedMerchant"
        optionLabel="commercialName"
        [filter]="true"
        filterBy="commercialName,code"
        placeholder="{{ 'DASHBOARD.SELECT_MERCHANT' | translate }}"
        (onChange)="onMerchantChange()"
        styleClass="border-0 shadow-none bg-transparent text-sm font-semibold w-48">
      </p-select>
    </div>
  </div>



  <!-- الجدول -->

  <div class="grid grid-cols-1 lg:grid-cols-1 gap-6">
    <app-charts title="{{ 'DASHBOARD.REVENUE_GROWTH' | translate }}"
      subtitle="{{ 'DASHBOARD.LAST_6_MONTHS' | translate }}" color="emerald" type="bar"></app-charts>
  </div>

</div>
