<p-toast position="top-right"></p-toast>
 
<div class="flex h-screen bg-[#f8fafc] dark:bg-[#0f172a] transition-colors duration-500 overflow-hidden relative"
     [dir]="currentDir">

  <!-- Sidebar -->
  <app-sidebar #sidebar class="z-50" (langChanged)="switchLang($event)"></app-sidebar>

  <!-- Main content wrapper -->
  <div class="flex-1 flex flex-col min-w-0 transition-all duration-300 ease-in-out">

    <!-- Header -->
    <app-header
      class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md"
      (openSidebar)="toggleSidebar()">
    </app-header>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 lg:p-10">
      <div class="max-w-[1400px] mx-auto animate-fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
  @if (loadingservices.isloading()) {
    <div class="absolute inset-0 z-[9999] flex items-center justify-center bg-black/30 backdrop-blur-sm">
      <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-2xl flex flex-col items-center gap-4">
        <span class="flex items-center gap-1.5">
          <span class="w-2 h-2 bg-purple-500 rounded-full animate-bounce [animation-delay:-0.3s]"></span>
          <span class="w-2 h-2 bg-purple-500 rounded-full animate-bounce [animation-delay:-0.15s]"></span>
          <span class="w-2 h-2 bg-purple-500 rounded-full animate-bounce"></span>
        </span>
        <span class="text-sm text-gray-500 dark:text-gray-400">Loading...</span>
      </div>
    </div>
  }
</div>
