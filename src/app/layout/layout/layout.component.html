<div class="flex h-screen bg-[#f8fafc] dark:bg-[#0f172a] transition-colors duration-500 overflow-hidden relative"
     [dir]="currentDir">

  <!-- Sidebar -->
  <app-sidebar
    #sidebar
    class="z-50"
    (langChanged)="switchLang($event)">
  </app-sidebar>

  <!-- Main content wrapper -->
  <div
    class="flex-1 flex flex-col min-w-0 transition-all duration-300 ease-in-out">

    <!-- Header -->
    <app-header
      class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md"
      (openSidebar)="sidebar.mobileOpen.set(true)">
    </app-header>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 lg:p-10">
      <div class="max-w-[1400px] mx-auto animate-fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

</div>
